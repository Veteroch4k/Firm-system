spring:
  application:
    name: gateway-service

  profiles:
    active: default

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 10000


  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8071}
