spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          default-filters:
            - TokenRelay=
          routes:
            - id: employers-service
              uri: lb://EMPLOYERS-SERVICE
              predicates:
                - Path=/employers/**
              filters:
                - StripPrefix=1

            - id: eureka-server
              uri: lb://EUREKA-SERVER
              predicates:
                - Path=/eureka/**
                - Method=GET
              filters:
                - RewritePath=/eureka/(?<path>.*), /$\{path}
                - StripPrefix=1

            - id: factory-service
              uri: lb://FACTORY-SERVICE
              predicates:
                - Path=/factory/**
              filters:
                - StripPrefix=1

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order/**
              filters:
                - StripPrefix=1

            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/product/**
              filters:
                - StripPrefix=1

            - id: warehouse-service
              uri: lb://WAREHOUSE-SERVICE
              predicates:
                - Path=/warehouse/**
              filters:
                - StripPrefix=1

            - id: toolwarehouse-service
              uri: lb://TOOLWAREHOUSE-SERVICE
              predicates:
                - Path=/toolwarehouse/**
              filters:
                - StripPrefix=1


  security:
    oauth2:
      client:
        provider:
          keycloak:
            authorization-uri: http://localhost:8181/realms/firm-realm/protocol/openid-connect/auth
            token-uri: http://keycloak:8080/realms/firm-realm/protocol/openid-connect/token
            issuer-uri: http://localhost:8181/realms/firm-realm
            jwk-set-uri: http://keycloak:8080/realms/firm-realm/protocol/openid-connect/certs
            user-info-uri: http://keycloak:8080/realms/firm-realm/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username
        registration:
          keycloak:
            client-id: gateway-client
            client-secret: j0IeIEnM0OewCCll2T9uMwbk9Rwihvlk
            scope: openid, profile, email, roles
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8070}/eureka/

server:
  port: 8072

management:
  endpoints:
    web:
      exposure:
        include: "*"
    enabled-by-default: true