spring:

  datasource:
    url: jdbc:postgresql://localhost:5433/firm_prod_db?currentSchema=toolwarehouse_service
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.migrations-master.yaml

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8070/eureka/



server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: "*"
    enabled-by-default: true





