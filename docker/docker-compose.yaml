services:
  postgres:
    image: postgres:15
    container_name: firm_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: firm_prod_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: firm_redis
    ports:
      - "6379:6379"
    networks:
      backend:
        aliases:
          - "redis"

  kafka:
    image: bitnami/kafka:latest
    container_name: firm_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    networks:
      backend:
        aliases:
          - "kafka"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=FirmCluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka
    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      # Фикс проблемы с редиректами
      - KC_HOSTNAME_URL=http://localhost:8181

    volumes:
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8181:8080"
    networks:
      - backend
  
  # Сервисы

  config-server:
    build: ../services/backend/config-service
    container_name: config-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8071/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8071:8071"
    networks:
      - backend

  eureka-server:
    build: ../services/backend/eureka-service
    container_name: eureka-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8070/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8070:8070"
    environment:
      - EUREKA_HOSTNAME=eureka-server
      - CONFIG_SERVER_URL=http://config-server:8071
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - backend

  api-gateway:
    build: ../services/backend/gateway-service
    container_name: api-gateway
    ports:
      - "8072:8072"
    environment:
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8070
      - CONFIG_SERVER_URL=http://config-server:8071
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - backend

  employer-service:
    build: ../services/backend/employers-service
    container_name: employer-service
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8070
      - CONFIG_SERVER_URL=http://config-server:8071
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - backend

  product-service:
    build: ../services/backend/product-service
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8070
      - CONFIG_SERVER_URL=http://config-server:8071
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - backend

  order-service:
    build: ../services/backend/order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8070
      - CONFIG_SERVER_URL=http://config-server:8071
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - backend

  factory-service:
    build: ../services/backend/factory-service
    container_name: factory-service
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8070
      - CONFIG_SERVER_URL=http://config-server:8071
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      redis:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - backend

  warehouse-service:
    build: ../services/backend/warehouse-service
    container_name: warehouse-service
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8070
      - CONFIG_SERVER_URL=http://config-server:8071
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - backend

  toolwarehouse-service:
    build: ../services/backend/toolwarehouse-service
    container_name: toolwarehouse-service
    ports:
      - "8085:8085"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
      - EUREKA_HOST=eureka-server
      - EUREKA_PORT=8070
      - CONFIG_SERVER_URL=http://config-server:8071
      - KEYCLOAK_HOST=keycloak
      - KEYCLOAK_PORT=8080
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - backend


networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  keycloak_data:
